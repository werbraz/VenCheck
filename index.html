<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดตารางเวรพนักงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="role-page">

<div class="role-card glass">
    <h1>📋 ระบบจัดตารางเวร</h1>
    <p>กรุณาเลือกประเภทผู้ใช้งาน</p>

    <button class="role-btn role-btn-admin" id="btn-admin-role">
        <span class="role-btn-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </span>
        Admin
    </button>

    <button class="role-btn role-btn-staff" id="btn-staff-role">
        <span class="role-btn-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M20 21v-1a8 8 0 0 0-16 0v1"/>
            </svg>
        </span>
        ผู้เข้าเวร
    </button>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Password Modal -->
<div class="modal-overlay" id="login-modal">
    <div class="modal-box">
        <h3>🔐 เข้าสู่ระบบ Admin</h3>
        <label for="login-pw">รหัสผ่าน</label>
        <input type="password" id="login-pw" class="modal-input" placeholder="รหัสผ่าน Admin">
        <div class="modal-error" id="login-error"></div>
        <div class="modal-actions">
            <button class="btn-secondary" id="btn-login-cancel">ยกเลิก</button>
            <button class="btn-primary" id="btn-login-confirm">เข้าสู่ระบบ</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const modal     = document.getElementById('login-modal');
    const pwInput   = document.getElementById('login-pw');
    const errMsg    = document.getElementById('login-error');
    const btnCancel = document.getElementById('btn-login-cancel');
    const btnOk     = document.getElementById('btn-login-confirm');

    document.getElementById('btn-admin-role').addEventListener('click', () => {
        pwInput.value = '';
        errMsg.textContent = '';
        modal.classList.add('active');
        setTimeout(() => pwInput.focus(), 100);
    });

    document.getElementById('btn-staff-role').addEventListener('click', () => {
        window.location.href = 'staff.html';
    });

    btnCancel.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

    const tryLogin = () => {
        const val = pwInput.value;
        if (!val) { errMsg.textContent = 'กรุณาใส่รหัสผ่าน'; return; }
        if (checkPassword(val)) {
            window.location.href = 'admin.html';
        } else {
            errMsg.textContent = 'รหัสผ่านไม่ถูกต้อง';
            pwInput.value = '';
            pwInput.focus();
        }
    };

    btnOk.addEventListener('click', tryLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
});
</script>
</body>
</html>
